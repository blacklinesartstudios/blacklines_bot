name: Blacklines Bot 24/7
on:
  schedule:
    - cron: '0 */4 * * *' # Runs every 4 hours
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to click "Run workflow" manually

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          # This looks for requirements.txt everywhere in the repo
          find . -name "requirements.txt" -exec pip install -r {} +

      - name: Run Blacklines Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          # This command finds bot.py wherever it is and runs it
          BOT_PATH=$(find . -name "bot.py" | head -n 1)
          if [ -z "$BOT_PATH" ]; then
            echo "Error: bot.py not found in the repository!"
            exit 1
          fi
          python "$BOT_PATH"
